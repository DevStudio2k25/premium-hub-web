<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content Test - Premium Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0B0F1A;
            color: #F8FAFC;
        }
        .test-section {
            background: rgba(23, 30, 48, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        h1 {
            color: #8B5CF6;
            margin-bottom: 30px;
        }
        h2 {
            color: #F472B6;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .status.loading {
            background: rgba(251, 191, 36, 0.2);
            color: #FCD34D;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ADE80;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #F87171;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .data-item:last-child {
            border-bottom: none;
        }
        .label {
            color: #94A3B8;
            font-weight: 500;
        }
        .value {
            color: #F8FAFC;
            font-weight: 600;
        }
        .btn {
            background: linear-gradient(135deg, #8B5CF6 0%, #D946EF 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 16px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .console {
            background: #000;
            color: #0F0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .console-line {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <h1>🧪 Dynamic Content Test Dashboard</h1>

    <div class="test-section">
        <h2>GitHub API Status <span class="status loading" id="apiStatus">Checking...</span></h2>
        <div id="apiData"></div>
    </div>

    <div class="test-section">
        <h2>Latest Release Info <span class="status loading" id="releaseStatus">Loading...</span></h2>
        <div id="releaseData"></div>
    </div>

    <div class="test-section">
        <h2>Repository Stats <span class="status loading" id="repoStatus">Loading...</span></h2>
        <div id="repoData"></div>
    </div>

    <div class="test-section">
        <h2>Download Button Test</h2>
        <a href="#" id="testDownloadBtn" class="btn" download>
            <span id="testDownloadText">Loading...</span>
        </a>
    </div>

    <div class="test-section">
        <h2>Console Logs</h2>
        <button class="btn" onclick="refreshData()">🔄 Refresh Data</button>
        <div class="console" id="consoleLog"></div>
    </div>

    <script src="config.js"></script>
    <script>
        const consoleLog = document.getElementById('consoleLog');
        
        // Override console.log to display in UI
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const line = document.createElement('div');
            line.className = 'console-line';
            line.textContent = args.join(' ');
            consoleLog.appendChild(line);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        };

        const GITHUB_OWNER = CONFIG.github.owner;
        const GITHUB_REPO = CONFIG.github.repo;
        const GITHUB_FULL_REPO = `${GITHUB_OWNER}/${GITHUB_REPO}`;
        const GITHUB_API_BASE = CONFIG.api.base;

        async function testAPI() {
            console.log('🔍 Testing GitHub API connection...');
            
            try {
                const response = await fetch(`${GITHUB_API_BASE}/repos/${GITHUB_FULL_REPO}`);
                const data = await response.json();
                
                document.getElementById('apiStatus').textContent = 'Connected';
                document.getElementById('apiStatus').className = 'status success';
                
                document.getElementById('apiData').innerHTML = `
                    <div class="data-item">
                        <span class="label">API Endpoint:</span>
                        <span class="value">${GITHUB_API_BASE}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Repository:</span>
                        <span class="value">${GITHUB_FULL_REPO}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Rate Limit Remaining:</span>
                        <span class="value">${response.headers.get('x-ratelimit-remaining') || 'N/A'}</span>
                    </div>
                `;
                
                console.log('✅ API connection successful');
            } catch (error) {
                document.getElementById('apiStatus').textContent = 'Failed';
                document.getElementById('apiStatus').className = 'status error';
                console.error('❌ API connection failed:', error);
            }
        }

        async function testRelease() {
            console.log('🔍 Fetching latest release...');
            
            try {
                const response = await fetch(`${GITHUB_API_BASE}/repos/${GITHUB_FULL_REPO}/releases/latest`);
                const release = await response.json();
                
                document.getElementById('releaseStatus').textContent = 'Found';
                document.getElementById('releaseStatus').className = 'status success';
                
                const apkAsset = release.assets.find(asset => 
                    asset.name.endsWith('.apk') || asset.content_type === 'application/vnd.android.package-archive'
                );
                
                document.getElementById('releaseData').innerHTML = `
                    <div class="data-item">
                        <span class="label">Version:</span>
                        <span class="value">${release.tag_name}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Release Name:</span>
                        <span class="value">${release.name || 'N/A'}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Published:</span>
                        <span class="value">${new Date(release.published_at).toLocaleDateString()}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">APK Found:</span>
                        <span class="value">${apkAsset ? '✅ Yes' : '❌ No'}</span>
                    </div>
                    ${apkAsset ? `
                    <div class="data-item">
                        <span class="label">APK Size:</span>
                        <span class="value">${(apkAsset.size / (1024 * 1024)).toFixed(2)} MB</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Download Count:</span>
                        <span class="value">${apkAsset.download_count}</span>
                    </div>
                    ` : ''}
                `;
                
                // Update test download button
                if (apkAsset) {
                    document.getElementById('testDownloadBtn').href = apkAsset.browser_download_url;
                    document.getElementById('testDownloadText').textContent = `Download ${release.tag_name} (${(apkAsset.size / (1024 * 1024)).toFixed(1)} MB)`;
                    console.log('✅ Download button updated');
                }
                
                console.log('✅ Release data loaded successfully');
            } catch (error) {
                document.getElementById('releaseStatus').textContent = 'Not Found';
                document.getElementById('releaseStatus').className = 'status error';
                console.error('❌ Failed to fetch release:', error);
            }
        }

        async function testRepo() {
            console.log('🔍 Fetching repository stats...');
            
            try {
                const response = await fetch(`${GITHUB_API_BASE}/repos/${GITHUB_FULL_REPO}`);
                const repo = await response.json();
                
                document.getElementById('repoStatus').textContent = 'Loaded';
                document.getElementById('repoStatus').className = 'status success';
                
                document.getElementById('repoData').innerHTML = `
                    <div class="data-item">
                        <span class="label">Stars:</span>
                        <span class="value">⭐ ${repo.stargazers_count}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Forks:</span>
                        <span class="value">🍴 ${repo.forks_count}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Watchers:</span>
                        <span class="value">👁️ ${repo.watchers_count}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Open Issues:</span>
                        <span class="value">🐛 ${repo.open_issues_count}</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Last Updated:</span>
                        <span class="value">${new Date(repo.updated_at).toLocaleDateString()}</span>
                    </div>
                `;
                
                console.log('✅ Repository stats loaded');
            } catch (error) {
                document.getElementById('repoStatus').textContent = 'Failed';
                document.getElementById('repoStatus').className = 'status error';
                console.error('❌ Failed to fetch repo stats:', error);
            }
        }

        async function refreshData() {
            consoleLog.innerHTML = '';
            console.log('🔄 Starting data refresh...');
            await Promise.all([testAPI(), testRelease(), testRepo()]);
            console.log('✅ All tests completed!');
        }

        // Run tests on page load
        refreshData();
    </script>
</body>
</html>
